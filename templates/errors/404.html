{% extends "base.html" %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center p-6">
    <div class="text-center max-w-xl">
        <div class="relative inline-block mb-12">
            <div class="w-40 h-40 bg-violet-50 rounded-[3rem] rotate-12 absolute inset-0 animate-pulse"></div>
            <div class="w-40 h-40 bg-white border-2 border-violet-100 rounded-[3rem] -rotate-6 relative flex items-center justify-center shadow-xl shadow-violet-100/50">
                <span class="text-6xl font-black text-violet-600 tracking-tighter">404</span>
            </div>
        </div>
        
        <h1 class="text-5xl font-black text-slate-900 tracking-tight mb-6">Lost in the Matrix?</h1>
        <p class="text-lg text-slate-500 font-medium mb-12 leading-relaxed">
            The coordinates you provided don't exist in our infrastructure. This page might have been relocated or terminated.
        </p>
        
        <div class="flex flex-col sm:flex-row items-center justify-center gap-4">
            <a href="{{ url_for('index') }}" class="w-full sm:w-auto bg-slate-900 text-white px-10 py-5 rounded-2xl font-black text-xs uppercase tracking-widest hover:bg-black hover:scale-105 transition-all shadow-xl shadow-slate-200">
                Back to Dashboard
            </a>
            <a href="{{ url_for('contact.display_contact') }}" class="w-full sm:w-auto bg-white border-2 border-slate-100 text-slate-600 px-10 py-5 rounded-2xl font-black text-xs uppercase tracking-widest hover:border-slate-300 transition-all">
                Report Issue
            </a>
        </div>
    </div>
</div>
{% endblock %}
