{% extends "base.html" %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center p-6">
    <div class="text-center max-w-xl">
        <div class="relative inline-block mb-12">
            <div class="w-40 h-40 bg-amber-50 rounded-[3rem] rotate-12 absolute inset-0 animate-pulse"></div>
            <div class="w-40 h-40 bg-white border-2 border-amber-100 rounded-[3rem] -rotate-6 relative flex items-center justify-center shadow-xl shadow-amber-100/50">
                <svg class="w-16 h-16 text-amber-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
            </div>
        </div>
        
        <h1 class="text-5xl font-black text-slate-900 tracking-tight mb-6">System Overload</h1>
        <p class="text-lg text-slate-500 font-medium mb-12 leading-relaxed">
            Something went wrong deep within our engine. Our engineers have been alerted and are working to restore the equilibrium.
        </p>
        
        <div class="flex flex-col sm:flex-row items-center justify-center gap-4">
            <button onclick="window.location.reload()" class="w-full sm:w-auto bg-slate-900 text-white px-10 py-5 rounded-2xl font-black text-xs uppercase tracking-widest hover:bg-black hover:scale-105 transition-all shadow-xl shadow-slate-200">
                Try Reloading
            </button>
            <a href="{{ url_for('index') }}" class="w-full sm:w-auto bg-white border-2 border-slate-100 text-slate-600 px-10 py-5 rounded-2xl font-black text-xs uppercase tracking-widest hover:border-slate-300 transition-all">
                Return Home
            </a>
        </div>
    </div>
</div>
{% endblock %}
