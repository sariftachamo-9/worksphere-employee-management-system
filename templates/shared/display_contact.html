{% extends "base.html" %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gray-50 py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-2xl w-full space-y-8 bg-white p-10 rounded-3xl shadow-2xl border border-slate-100">
        <div class="text-center">
            <h2 class="text-4xl font-black text-slate-900 tracking-tight">Contact <span class="text-orange-600">Administrator</span></h2>
            <p class="mt-3 text-lg text-slate-500 font-medium">Have questions or need account access? We're here to help.</p>
        </div>

        <form action="{{ url_for('contact.submit_inquiry') }}" method="POST" class="mt-10 space-y-6">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Full Name *</label>
                    <input type="text" name="name" required placeholder="John Doe"
                        class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-orange-500 transition-all font-medium">
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Email Address *</label>
                    <input type="email" name="email" required placeholder="john@company.com"
                        class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-orange-500 transition-all font-medium">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Phone Number</label>
                    <input type="text" name="phone" placeholder="98XXXXXXXX" pattern="(98|97)\d{8}" maxlength="10" title="Enter a valid Nepali phone number: 10 digits starting with 98 or 97."
                        class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-orange-500 transition-all font-medium"
                        oninput="this.value=this.value.replace(/[^0-9]/g,'')">
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Category *</label>
                    <select name="category" required
                        class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-orange-500 transition-all font-medium bg-white">
                        <option value="General">General Inquiry</option>
                        <option value="Urgent">Urgent Inquiry (Account Lockout)</option>
                        <option value="Technical">Technical Support</option>
                        <option value="HR">Human Resources</option>
                        <option value="Payroll">Payroll & Salary</option>
                        <option value="Leave">Leave Management</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
            </div>

            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">Subject *</label>
                <input type="text" name="subject" required placeholder="Brief description of your query"
                    class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-orange-500 transition-all font-medium">
            </div>

            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">Message *</label>
                <textarea name="description" rows="4" required minlength="10" placeholder="Please provide details about your request..."
                    class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-orange-500 transition-all font-medium"></textarea>
            </div>

            <div class="pt-4">
                <button type="submit" 
                    class="w-full bg-orange-600 hover:bg-orange-700 text-white font-black py-4 rounded-2xl transition-all shadow-xl shadow-orange-100 flex items-center justify-center space-x-2">
                    <span>Submit Request</span>
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M13 7l5 5m0 0l-5 5m5-5H6"></path></svg>
                </button>
            </div>
            
            <div class="text-center">
                <a href="{{ url_for('auth.login') }}" class="text-sm font-bold text-slate-400 hover:text-orange-600 transition-colors">Back to Login</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
