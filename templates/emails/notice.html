<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; line-height: 1.6; color: #1e293b; }
        .container { max-width: 600px; margin: 40px auto; padding: 40px; border: 1px solid #f1f5f9; border-radius: 24px; }
        .header { margin-bottom: 30px; }
        .logo { font-size: 24px; font-weight: 900; color: #f26522; text-transform: uppercase; letter-spacing: 2px; }
        .title { font-size: 20px; font-weight: 800; color: #0f172a; margin-top: 20px; }
        .content { font-size: 15px; color: #475569; margin-top: 20px; white-space: pre-wrap; }
        .footer { margin-top: 40px; font-size: 12px; color: #94a3b8; border-top: 1px solid #f1f5f9; pt: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <span class="logo">EMS Central</span>
        </div>
        <div class="title">{{ title }}</div>
        <div class="content">{{ content }}</div>
        <div class="footer">
            This is a system-generated broadcast. Please do not reply to this email.<br>
            &copy; 2026 Employee Management System.
        </div>
    </div>
</body>
</html>
