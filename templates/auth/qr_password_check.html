{% extends "base.html" %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gray-50 py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full space-y-8 bg-white p-8 rounded-2xl shadow-xl border border-gray-100">
        <div class="text-center">
            <div class="mx-auto h-16 w-16 bg-orange-50 rounded-2xl flex items-center justify-center mb-4 border border-orange-100">
                <svg class="h-8 w-8 text-orange-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 11c0 3.517-1.009 6.799-2.753 9.571m-1.17-10.962A10.05 10.05 0 0112 3c4.478 0 8.268 2.943 9.542 7m-1.174 0a9.96 9.96 0 010 4m-2.124 5.159a10.042 10.042 0 01-9.753 1.341M11 11H7a4 4 0 00-4 4v1c0 1.1.9 2 2 2h2m4-14a4 4 0 11-8 0 4 4 0 018 0z"></path>
                </svg>
            </div>
            <h2 class="text-2xl font-black text-gray-900 tracking-tight">Admin Identity Check</h2>
            <p class="mt-2 text-sm text-gray-500 font-medium">Verifying Admin: <span class="text-gray-900 font-bold uppercase">{{ user.profile.full_name if user.profile else user.email }}</span></p>
        </div>

        <form class="mt-8 space-y-6" method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="rounded-xl shadow-sm -space-y-px">
                <div class="relative">
                    <label for="password" class="sr-only">Password</label>
                    <input id="password" name="password" type="password" required 
                        class="appearance-none relative block w-full px-4 py-3 border border-gray-300 placeholder-gray-400 text-gray-900 rounded-xl focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-orange-500 focus:z-10 sm:text-sm font-medium transition-all" 
                        placeholder="Enter Admin Password">
                </div>
            </div>

            <div>
                <button type="submit" 
                    class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-bold rounded-xl text-white bg-orange-600 hover:bg-orange-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-orange-500 transition-all shadow-lg shadow-orange-100">
                    Verify & Access Dashboard
                </button>
            </div>
            
            <div class="text-center">
                <a href="{{ url_for('auth.login') }}" class="text-xs font-bold text-gray-400 hover:text-gray-600 transition-colors uppercase tracking-widest">Cancel Login</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
