{% extends "base.html" %}

{% block content %}
<div class="min-h-screen flex flex-col md:flex-row bg-white">
    <!-- Left: Brand Hero (Visible on Desktop) -->
    <div class="hidden md:flex md:w-1/2 bg-slate-50 relative overflow-hidden items-center justify-center p-12">
        <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-orange-100/50 rounded-full blur-3xl animate-pulse"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-emerald-100/50 rounded-full blur-3xl"></div>
        
        <div class="relative z-10 text-center">
            <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Logo" class="max-w-[400px] h-auto mx-auto mb-8 drop-shadow-2xl" onerror="this.src='https://via.placeholder.com/400x150?text=GN+GLOBAL+IOT'">
            <h1 class="text-4xl lg:text-5xl font-black text-orange-600 tracking-tight mb-4">Account Recovery</h1>
            <p class="text-slate-700 text-lg font-bold">Reset your secure access credentials</p>
        </div>
    </div>

    <!-- Right: Form -->
    <div class="w-full md:w-1/2 flex items-center justify-center p-8 md:p-16 lg:p-24 bg-white/90 backdrop-blur-md">
        <div class="w-full max-w-md">
            <div class="mb-10">
                <a href="{{ url_for('auth.login') }}" class="inline-flex items-center text-sm font-black text-orange-600 hover:text-orange-700 mb-6 transition uppercase tracking-widest">
                    <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                    Back to Login
                </a>
                <h2 class="text-3xl font-black text-slate-900 tracking-tight">Forgot Password?</h2>
                <p class="text-slate-700 mt-3 font-bold">Enter your account login email and we'll send a secure OTP to your **registered personal email**.</p>
            </div>

            <form method="POST" action="{{ url_for('auth.forgot_password') }}" class="space-y-6">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div>
                    <label class="block text-xs font-bold text-slate-700 uppercase tracking-widest mb-2">Login Email Address</label>
                    <input type="email" name="email" required 
                           class="w-full px-4 py-4 rounded-xl border border-slate-200 focus:ring-2 focus:ring-orange-500 focus:border-transparent transition bg-slate-50/50 placeholder:text-slate-300"
                           placeholder="staff-name@ems.com">
                </div>
                
                <button type="submit" 
                        class="w-full bg-orange-600 hover:bg-orange-700 text-white font-bold py-4 rounded-xl shadow-lg shadow-orange-200 transition transform hover:-translate-y-0.5 active:scale-95">
                    Send Reset OTP
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
