{% extends "base.html" %}

{% block content %}
<div class="max-w-md mx-auto mt-20">
    <div class="bg-white p-8 rounded-2xl shadow-xl border border-slate-100">
        <div class="text-center mb-10">
            <div class="w-16 h-16 bg-orange-100 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg class="w-8 h-8 text-orange-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                </svg>
            </div>
            <h1 class="text-3xl font-bold text-slate-800">Verify Identity</h1>
            <p class="text-slate-500 mt-2">We've sent a 6-digit code to your email.</p>
        </div>
        
        <form method="POST" action="{{ url_for('auth.verify_otp') }}" class="space-y-6">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="flex justify-between space-x-2" x-data="{ otp: '' }">
                <input type="text" name="otp" maxlength="6" required 
                       class="w-full text-center text-2xl tracking-[1em] font-mono px-4 py-4 rounded-xl border border-slate-200 focus:ring-2 focus:ring-orange-500 focus:border-transparent transition"
                       placeholder="000000">
            </div>
            <button type="submit" 
                    class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 rounded-xl shadow-lg shadow-emerald-200 transition transform hover:-translate-y-0.5">
                Verify & Log In
            </button>
        </form>
        
        <div class="mt-8 text-center">
            <p class="text-sm text-slate-500">Didn't receive the code? <a href="{{ url_for('auth.resend_otp') }}" class="text-emerald-600 font-semibold">Resend code</a></p>
        </div>
    </div>
</div>
{% endblock %}
